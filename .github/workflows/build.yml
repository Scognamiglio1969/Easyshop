name: Build Easyshop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Self-test
        run: Scripts/run-tests.sh
      - name: Build app and DMG
        run: Scripts/build-app.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Easyshop-DMG
          path: outputs/Easyshop-0.1.0-alpha.dmg
